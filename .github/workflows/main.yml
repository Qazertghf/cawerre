name: Sarcar Auto Task

on:
  schedule:
    - cron: '0 */2 * * *' # هر دو ساعت یکبار اجرا می‌شود
  workflow_dispatch: # امکان اجرای دستی برای تست

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Sarcar Script
        env:
          TARGET_URLS: ${{ secrets.TARGET_URLS }}
        run: python sarcar.py

      - name: Zip with Password
        run: |
          sudo apt-get install zip
          rm -f sarcar_data.zip
          zip -P "${{ secrets.ZIP_PASSWORD }}" -r sarcar_data.zip output/

      - name: Send to Bale Bot
        run: |
          curl -X POST "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendDocument" \
          -F "chat_id=${{ secrets.BALE_CHAT_ID }}" \
          -F "document=@sarcar_data.zip" \
          -F "caption=فایل جدید استخراج شده (sarcar) 🚀"

      - name: Update Repository
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sarcar_data.zip
          git commit -m "Update sarcar zip file" || exit 0
          git push origin main
